<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Ridvanify | Özel Müzik Akışı</title>
    <!-- Google Fonts & Modern Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #0a0c10 0%, #0f1117 100%);
            color: #eef2ff;
            overflow-x: hidden;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #1e1f2c;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #ec4899;
            border-radius: 10px;
        }

        .app {
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px 30px 100px 30px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 35px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(236, 72, 153, 0.3);
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo i {
            font-size: 34px;
            background: linear-gradient(135deg, #f472b6, #ec4899);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .logo h1 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(to right, #ffffff, #f472b6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }
        .search-bar {
            background: #1a1d2b;
            border-radius: 60px;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            width: 320px;
            backdrop-filter: blur(8px);
            border: 1px solid #2d2f3e;
            transition: all 0.2s;
        }
        .search-bar:focus-within {
            border-color: #ec4899;
            box-shadow: 0 0 12px rgba(236, 72, 153, 0.3);
        }
        .search-bar i {
            color: #9ca3af;
        }
        .search-bar input {
            background: transparent;
            border: none;
            width: 100%;
            font-size: 0.95rem;
            color: white;
            outline: none;
        }
        .user-icon {
            background: linear-gradient(135deg, #ec4899, #be185d);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .categories {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            margin-bottom: 40px;
        }
        .cat-btn {
            background: transparent;
            border: 1px solid #2d2f3e;
            padding: 8px 22px;
            border-radius: 40px;
            font-weight: 500;
            color: #cbd5e1;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
        }
        .cat-btn.active, .cat-btn:hover {
            background: #ec4899;
            border-color: #ec4899;
            color: white;
            box-shadow: 0 4px 14px rgba(236, 72, 153, 0.4);
        }

        .section-title {
            font-size: 1.7rem;
            font-weight: 600;
            margin: 30px 0 18px 0;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .section-title i {
            font-size: 1.6rem;
            color: #f472b6;
        }

        .grid-cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 24px;
        }
        .music-card {
            background: #141824;
            border-radius: 20px;
            padding: 16px;
            transition: all 0.25s ease;
            cursor: pointer;
            border: 1px solid #24283a;
            backdrop-filter: blur(2px);
        }
        .music-card:hover {
            transform: translateY(-6px);
            background: #1c2130;
            border-color: #ec4899;
            box-shadow: 0 20px 30px -12px rgba(236, 72, 153, 0.3);
        }
        .card-img {
            background: linear-gradient(145deg, #2a2e42, #1a1e2c);
            border-radius: 16px;
            height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.2rem;
            color: #f472b6;
            margin-bottom: 14px;
            transition: 0.2s;
            overflow: hidden;
            position: relative;
        }
        .card-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 16px;
        }
        .music-card h4 {
            font-size: 1rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .music-card p {
            font-size: 0.8rem;
            color: #a0a5c0;
            margin-top: 5px;
        }
        .play-hint {
            font-size: 0.7rem;
            margin-top: 10px;
            color: #f472b6;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .featured-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #ec4899;
            color: white;
            font-size: 0.7rem;
            padding: 4px 8px;
            border-radius: 20px;
            font-weight: bold;
            z-index: 2;
        }

        /* ŞİMDİ ÇALIYOR BAR - GÜNCELLENMİŞ (Ses kontrolü eklendi) */
        .now-playing-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(10, 12, 18, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid #ec4899;
            padding: 12px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            z-index: 1000;
            box-shadow: 0 -8px 25px rgba(0,0,0,0.5);
        }
        .track-info {
            display: flex;
            align-items: center;
            gap: 15px;
            min-width: 180px;
        }
        .track-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(145deg, #1e2235, #0f111a);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            color: #f472b6;
            overflow: hidden;
        }
        .track-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .track-details h4 {
            font-size: 0.95rem;
            font-weight: 600;
        }
        .track-details p {
            font-size: 0.7rem;
            color: #aaa;
        }
        .player-controls {
            display: flex;
            align-items: center;
            gap: 28px;
        }
        .ctrl-btn {
            background: none;
            border: none;
            color: #e2e8f0;
            font-size: 1.3rem;
            cursor: pointer;
            transition: 0.1s;
        }
        .ctrl-btn:hover {
            color: #f472b6;
            transform: scale(1.05);
        }
        .play-pause {
            background: #ec4899;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: white;
        }
        .play-pause:hover {
            background: #f472b6;
            transform: scale(1.02);
        }
        .progress-area {
            flex: 1.5;
            min-width: 200px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .time-current, .time-duration {
            font-size: 0.75rem;
            color: #94a3b8;
        }
        .progress-bar {
            flex: 1;
            height: 4px;
            background: #2d2f3e;
            border-radius: 5px;
            cursor: pointer;
            position: relative;
        }
        .progress-filled {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #f472b6, #ec4899);
            border-radius: 5px;
            position: relative;
        }
        
        /* SES AYARLAMA BÖLÜMÜ - YENİ */
        .volume-control {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #1a1d2b;
            padding: 5px 12px;
            border-radius: 30px;
            border: 1px solid #2d2f3e;
            transition: all 0.2s;
        }
        .volume-control:hover {
            border-color: #ec4899;
        }
        .volume-icon {
            color: #f472b6;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.1s;
        }
        .volume-icon:hover {
            color: #ec4899;
            transform: scale(1.05);
        }
        .volume-slider {
            width: 90px;
            height: 4px;
            -webkit-appearance: none;
            background: #2d2f3e;
            border-radius: 5px;
            outline: none;
            cursor: pointer;
        }
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ec4899;
            cursor: pointer;
            box-shadow: 0 0 5px #ec4899;
        }
        .volume-slider::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }
        .volume-value {
            font-size: 0.7rem;
            color: #cbd5e1;
            min-width: 38px;
            text-align: center;
        }

        @media (max-width: 900px) {
            .now-playing-bar {
                flex-direction: column;
                align-items: stretch;
                padding: 12px;
            }
            .progress-area {
                width: 100%;
            }
            .volume-control {
                align-self: flex-start;
                margin-top: 5px;
            }
        }
        @media (max-width: 700px) {
            .app {
                padding: 15px 20px 100px 20px;
            }
        }
        footer {
            text-align: center;
            margin-top: 50px;
            font-size: 0.75rem;
            color: #4b5563;
        }
        .welcome-msg {
            background: linear-gradient(135deg, rgba(236,72,153,0.1), rgba(236,72,153,0.05));
            border-radius: 16px;
            padding: 12px 20px;
            margin-bottom: 25px;
            border-left: 4px solid #ec4899;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div class="app">
    <div class="header">
        <div class="logo">
            <i class="fas fa-crown"></i>
            <h1>Ridvanify</h1>
        </div>
        <div class="search-bar">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Sanatçı, şarkı veya albüm ara...">
        </div>
        <div class="user-icon">
            <i class="fas fa-user-astronaut"></i>
        </div>
    </div>

    <div class="welcome-msg">
        <i class="fas fa-headphones" style="margin-right: 8px; color:#ec4899;"></i> 
        🎵 Ridvanify'a hoş geldin! Ridvani'nin özel şarkıları burada. Ses seviyesini ayarlayabilirsin.
    </div>

    <div class="categories" id="categoriesContainer"></div>

    <div class="section-title">
        <i class="fas fa-chart-line"></i> 
        <span>🔥 Ridvani Exclusive 🔥</span>
    </div>
    <div class="grid-cards" id="popularGrid"></div>

    <div class="section-title">
        <i class="fas fa-microphone-alt"></i>
        <span>Keşfet | Günün Hitleri</span>
    </div>
    <div class="grid-cards" id="discoverGrid"></div>
    <footer>🎵 Ridvanify · Özel Müzik Deneyimi · Ridvani & Lovesmasher · Ses Kontrolü</footer>
</div>

<!-- ŞİMDİ ÇALIYOR BAR (ses ayarı eklendi) -->
<div class="now-playing-bar" id="nowPlayingBar">
    <div class="track-info">
        <div class="track-icon" id="trackIcon">
            <i class="fas fa-music"></i>
        </div>
        <div class="track-details">
            <h4 id="currentSongTitle">Şarkı seçilmedi</h4>
            <p id="currentArtist">Ridvanify'da keşfet</p>
        </div>
    </div>
    <div class="player-controls">
        <button class="ctrl-btn" id="prevBtn"><i class="fas fa-backward-step"></i></button>
        <button class="ctrl-btn play-pause" id="playPauseBtn"><i class="fas fa-play"></i></button>
        <button class="ctrl-btn" id="nextBtn"><i class="fas fa-forward-step"></i></button>
    </div>
    <div class="progress-area">
        <span class="time-current" id="currentTime">0:00</span>
        <div class="progress-bar" id="progressBar">
            <div class="progress-filled" id="progressFilled"></div>
        </div>
        <span class="time-duration" id="durationTime">0:00</span>
    </div>
    <!-- SES AYARLAMA BÖLÜMÜ -->
    <div class="volume-control">
        <i class="fas fa-volume-up volume-icon" id="volumeIcon"></i>
        <input type="range" id="volumeSlider" class="volume-slider" min="0" max="100" value="80">
        <span class="volume-value" id="volumeValue">80%</span>
    </div>
</div>

<script>
    // ========== ÖZEL RİDVANİ ŞARKILARI ==========
    const RIDVANI_SONGS = [
        {
            id: 999,
            title: "Patlaticam",
            artist: "Ridvani",
            category: "ridvani",
            src: "https://files.catbox.moe/bkxltz.mp3",
            coverIcon: "fa-bomb",
            coverImage: "ridvani_patlaticam.png",
            duration: 198,
            isSpecial: true
        },
        {
            id: 1000,
            title: "Lovesmasher",
            artist: "Ridvan",
            category: "ridvani",
            src: "https://files.catbox.moe/opqrw6.mp3",
            coverIcon: "fa-heart-crack",
            coverImage: "lovesmash.png",
            duration: 215,
            isSpecial: true
        }
    ];

    // MÜZİK VERİTABANI (Ridvani özel şarkılar en üstte)
    const SONGS_DB = [
        ...RIDVANI_SONGS,
        { id: 1, title: "Blinding Lights", artist: "The Weeknd", category: "pop", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3", coverIcon: "fa-sun", duration: 210 },
        { id: 2, title: "Rolling in the Deep", artist: "Adele", category: "pop", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3", coverIcon: "fa-water", duration: 228 },
        { id: 3, title: "Lose Control", artist: "Teddy Swims", category: "soul", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3", coverIcon: "fa-heart", duration: 205 },
        { id: 4, title: "Houdini", artist: "Dua Lipa", category: "pop", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3", coverIcon: "fa-magic", duration: 198 },
        { id: 5, title: "Starboy", artist: "The Weeknd", category: "rnb", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-5.mp3", coverIcon: "fa-rocket", duration: 230 },
        { id: 6, title: "Levitating", artist: "Dua Lipa", category: "pop", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-6.mp3", coverIcon: "fa-star", duration: 203 },
        { id: 7, title: "Flowers", artist: "Miley Cyrus", category: "pop", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-7.mp3", coverIcon: "fa-seedling", duration: 200 },
        { id: 8, title: "Creepin'", artist: "Metro Boomin", category: "rnb", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3", coverIcon: "fa-ghost", duration: 215 },
        { id: 9, title: "Uptown Funk", artist: "Bruno Mars", category: "funk", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-9.mp3", coverIcon: "fa-drumstick-bite", duration: 270 },
        { id: 10, title: "Rockstar", artist: "Post Malone", category: "hiphop", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-10.mp3", coverIcon: "fa-guitar", duration: 218 }
    ];

    let currentPlaylist = [...SONGS_DB];
    let currentIndex = 0;
    let audio = new Audio();
    let isPlaying = false;

    // Ses ayarı değişkenleri
    let currentVolume = 80; // yüzde olarak
    audio.volume = currentVolume / 100;

    // DOM elementleri
    const popularGrid = document.getElementById('popularGrid');
    const discoverGrid = document.getElementById('discoverGrid');
    const searchInput = document.getElementById('searchInput');
    const categoriesDiv = document.getElementById('categoriesContainer');
    const currentSongTitleSpan = document.getElementById('currentSongTitle');
    const currentArtistSpan = document.getElementById('currentArtist');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const progressBarDiv = document.getElementById('progressBar');
    const progressFilled = document.getElementById('progressFilled');
    const currentTimeSpan = document.getElementById('currentTime');
    const durationTimeSpan = document.getElementById('durationTime');
    const trackIconDiv = document.getElementById('trackIcon');
    
    // Ses kontrolleri DOM
    const volumeSlider = document.getElementById('volumeSlider');
    const volumeValueSpan = document.getElementById('volumeValue');
    const volumeIcon = document.getElementById('volumeIcon');

    // Kategoriler (Ridvani özel kategorisi eklendi)
    const categoriesList = ["Tümü", "ridvani", "pop", "soul", "rnb", "funk", "hiphop"];
    let activeCategory = "Tümü";

    // ========== SES AYARI FONKSİYONLARI ==========
    function updateVolumeUI() {
        volumeSlider.value = currentVolume;
        volumeValueSpan.textContent = Math.round(currentVolume) + "%";
        audio.volume = currentVolume / 100;
        // Ses simgesini güncelle
        if (currentVolume === 0) {
            volumeIcon.className = "fas fa-volume-mute volume-icon";
        } else if (currentVolume < 30) {
            volumeIcon.className = "fas fa-volume-off volume-icon";
        } else if (currentVolume < 70) {
            volumeIcon.className = "fas fa-volume-down volume-icon";
        } else {
            volumeIcon.className = "fas fa-volume-up volume-icon";
        }
    }

    function setVolume(value) {
        let newVolume = Math.min(100, Math.max(0, parseFloat(value)));
        if (isNaN(newVolume)) newVolume = 80;
        currentVolume = newVolume;
        updateVolumeUI();
    }

    function toggleMute() {
        if (currentVolume > 0) {
            // Ses kapat: önceki sesi hatırla (0 ise zaten kapalı)
            if (currentVolume !== 0) {
                audio.setAttribute('data-prev-volume', currentVolume);
                setVolume(0);
            } else {
                setVolume(80);
            }
        } else {
            // Sesi geri aç
            let prevVol = audio.getAttribute('data-prev-volume');
            if (prevVol && prevVol > 0) {
                setVolume(parseFloat(prevVol));
            } else {
                setVolume(80);
            }
        }
    }

    // Volume slider event
    volumeSlider.addEventListener('input', (e) => {
        setVolume(e.target.value);
    });
    volumeIcon.addEventListener('click', toggleMute);

    // ========== MÜZİK ÇALAR FONKSİYONLARI ==========
    function renderCategories() {
        categoriesDiv.innerHTML = '';
        const displayNames = {
            "Tümü": "🔥 Tümü",
            "ridvani": "👑 Ridvani Özel",
            "pop": "Pop",
            "soul": "Soul",
            "rnb": "R&B",
            "funk": "Funk",
            "hiphop": "Hip Hop"
        };
        categoriesList.forEach(cat => {
            const btn = document.createElement('button');
            btn.className = `cat-btn ${activeCategory === cat ? 'active' : ''}`;
            btn.textContent = displayNames[cat] || cat.charAt(0).toUpperCase() + cat.slice(1);
            btn.addEventListener('click', () => {
                activeCategory = cat;
                renderCategories();
                filterAndRenderSongs();
            });
            categoriesDiv.appendChild(btn);
        });
    }

    function filterSongs() {
        let filtered = [...SONGS_DB];
        if (activeCategory !== "Tümü") {
            filtered = filtered.filter(song => song.category === activeCategory);
        }
        const searchTerm = searchInput.value.trim().toLowerCase();
        if (searchTerm) {
            filtered = filtered.filter(song => song.title.toLowerCase().includes(searchTerm) || song.artist.toLowerCase().includes(searchTerm));
        }
        return filtered;
    }

    function getCardImageHtml(song) {
        if (song.isSpecial && song.coverImage) {
            return `<img src="${song.coverImage}" alt="${song.title}" style="width:100%; height:100%; object-fit:cover;" onerror="this.onerror=null; this.parentElement.innerHTML='<i class=\'fas ${song.coverIcon}\' style=\'font-size:3rem;\'></i>';">`;
        }
        return `<i class="fas ${song.coverIcon}" style="font-size:3rem;"></i>`;
    }

    function renderGrid(container, songsArray) {
        if(!container) return;
        if(songsArray.length === 0) {
            container.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:40px;">🎵 Şarkı bulunamadı 🤷‍♂️</div>`;
            return;
        }
        container.innerHTML = songsArray.map(song => `
            <div class="music-card" data-id="${song.id}">
                <div class="card-img" style="position:relative;">
                    ${getCardImageHtml(song)}
                    ${song.isSpecial ? '<div class="featured-badge"><i class="fas fa-crown"></i> Ridvani Özel</div>' : ''}
                </div>
                <h4>${escapeHtml(song.title)}</h4>
                <p>${escapeHtml(song.artist)}</p>
                <div class="play-hint"><i class="fas fa-play-circle"></i> oynat</div>
            </div>
        `).join('');
        
        document.querySelectorAll('.music-card').forEach(card => {
            card.addEventListener('click', (e) => {
                const id = parseInt(card.getAttribute('data-id'));
                const song = SONGS_DB.find(s => s.id === id);
                if(song) {
                    const currentFiltered = filterSongs();
                    const newIndex = currentFiltered.findIndex(s => s.id === id);
                    if(newIndex !== -1) {
                        setPlaylistAndPlay(currentFiltered, newIndex, true);
                    }
                }
            });
        });
    }

    function updateNowPlayingIcon(song) {
        if(!trackIconDiv) return;
        if(song && song.isSpecial && song.coverImage) {
            trackIconDiv.innerHTML = `<img src="${song.coverImage}" alt="cover" style="width:100%; height:100%; object-fit:cover; border-radius:12px;" onerror="this.onerror=null; this.parentElement.innerHTML='<i class=\'fas ${song.coverIcon}\' style=\'font-size:1.8rem;\'></i>';">`;
        } else {
            const iconClass = (song && song.coverIcon) ? song.coverIcon : "fa-music";
            trackIconDiv.innerHTML = `<i class="fas ${iconClass}" style="font-size:1.8rem;"></i>`;
        }
    }

    function filterAndRenderSongs() {
        const filtered = filterSongs();
        const popularOnes = filtered.slice(0, 6);
        const discoverOnes = filtered.length > 6 ? filtered.slice(6, 12) : filtered.slice(0, filtered.length);
        
        renderGrid(popularGrid, popularOnes);
        renderGrid(discoverGrid, discoverOnes);
        
        if (!filtered.some(s => s.id === currentPlaylist[currentIndex]?.id)) {
            if(filtered.length > 0) setPlaylistAndPlay(filtered, 0, true);
            else resetPlayer();
        } else {
            currentPlaylist = [...filtered];
            const stillExists = currentPlaylist.find(s => s.id === currentPlaylist[currentIndex]?.id);
            if(!stillExists && currentPlaylist.length) setPlaylistAndPlay(currentPlaylist, 0, true);
        }
    }

    function setPlaylistAndPlay(playlist, idx, autoPlay = true) {
        if(!playlist.length) return;
        currentPlaylist = [...playlist];
        currentIndex = idx % currentPlaylist.length;
        loadCurrentSong();
        if(autoPlay) {
            audio.play().then(() => {
                isPlaying = true;
                updatePlayPauseIcon();
            }).catch(e => console.log("play error", e));
        } else {
            isPlaying = false;
            updatePlayPauseIcon();
        }
    }

    function loadCurrentSong() {
        if(!currentPlaylist.length) return;
        const song = currentPlaylist[currentIndex];
        if(!song) return;
        
        if (audio.src !== song.src) {
            audio.src = song.src;
            audio.load();
        }
        
        currentSongTitleSpan.textContent = song.title;
        currentArtistSpan.textContent = song.artist;
        updateNowPlayingIcon(song);
        
        progressFilled.style.width = "0%";
        currentTimeSpan.textContent = "0:00";
        if(song.duration) {
            const mins = Math.floor(song.duration / 60);
            const secs = song.duration % 60;
            durationTimeSpan.textContent = `${mins}:${secs < 10 ? '0'+secs : secs}`;
        } else {
            durationTimeSpan.textContent = "0:00";
        }
        updatePlayPauseIcon();
    }

    function updatePlayPauseIcon() {
        const icon = playPauseBtn.querySelector('i');
        if(isPlaying) {
            icon.className = "fas fa-pause";
        } else {
            icon.className = "fas fa-play";
        }
    }

    function resetPlayer() {
        audio.pause();
        isPlaying = false;
        currentSongTitleSpan.textContent = "Şarkı seçilmedi";
        currentArtistSpan.textContent = "Ridvanify'da keşfet";
        trackIconDiv.innerHTML = '<i class="fas fa-music" style="font-size:1.8rem;"></i>';
        updatePlayPauseIcon();
        progressFilled.style.width = "0%";
        currentTimeSpan.textContent = "0:00";
        durationTimeSpan.textContent = "0:00";
    }

    function formatTime(seconds) {
        if(isNaN(seconds)) return "0:00";
        const mins = Math.floor(seconds / 60);
        const secs = Math.floor(seconds % 60);
        return `${mins}:${secs < 10 ? '0'+secs : secs}`;
    }

    function updateProgress() {
        if(!audio.duration || isNaN(audio.duration)) return;
        const percent = (audio.currentTime / audio.duration) * 100;
        progressFilled.style.width = `${percent}%`;
        currentTimeSpan.textContent = formatTime(audio.currentTime);
        if(audio.duration && !isNaN(audio.duration)) {
            durationTimeSpan.textContent = formatTime(audio.duration);
        }
    }

    function setProgress(e) {
        const rect = progressBarDiv.getBoundingClientRect();
        const offsetX = e.clientX - rect.left;
        const percent = offsetX / rect.width;
        if(audio.duration) {
            audio.currentTime = percent * audio.duration;
        }
    }

    function nextTrack() {
        if(!currentPlaylist.length) return;
        currentIndex = (currentIndex + 1) % currentPlaylist.length;
        loadCurrentSong();
        if(isPlaying) {
            audio.play().catch(e=>console.log);
        }
    }

    function prevTrack() {
        if(!currentPlaylist.length) return;
        currentIndex = (currentIndex - 1 + currentPlaylist.length) % currentPlaylist.length;
        loadCurrentSong();
        if(isPlaying) {
            audio.play().catch(e=>console.log);
        }
    }

    function togglePlayPause() {
        if(!currentPlaylist.length) {
            const defaultList = filterSongs();
            if(defaultList.length) setPlaylistAndPlay(defaultList, 0, true);
            return;
        }
        if(isPlaying) {
            audio.pause();
            isPlaying = false;
        } else {
            audio.play().catch(e=>console.log);
            isPlaying = true;
        }
        updatePlayPauseIcon();
    }

    // Audio event listeners
    audio.addEventListener('timeupdate', updateProgress);
    audio.addEventListener('ended', () => {
        nextTrack();
    });
    audio.addEventListener('play', () => { isPlaying = true; updatePlayPauseIcon(); });
    audio.addEventListener('pause', () => { isPlaying = false; updatePlayPauseIcon(); });
    audio.addEventListener('error', (e) => {
        console.error("Audio error:", e);
        if(currentPlaylist[currentIndex]?.isSpecial) {
            console.log("Özel şarkı yüklenemedi, sonraki şarkıya geçiliyor...");
            nextTrack();
        }
    });
    
    progressBarDiv.addEventListener('click', setProgress);
    playPauseBtn.addEventListener('click', togglePlayPause);
    prevBtn.addEventListener('click', prevTrack);
    nextBtn.addEventListener('click', nextTrack);
    searchInput.addEventListener('input', () => filterAndRenderSongs());

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if(m === '&') return '&amp;';
            if(m === '<') return '&lt;';
            if(m === '>') return '&gt;';
            return m;
        });
    }

    function init() {
        renderCategories();
        filterAndRenderSongs();
        const allFiltered = filterSongs();
        if(allFiltered.length) {
            const ridvaniIndex = allFiltered.findIndex(s => s.id === 999);
            setPlaylistAndPlay(allFiltered, ridvaniIndex !== -1 ? ridvaniIndex : 0, false);
        }
        // Ses ayarını başlat
        updateVolumeUI();
    }
    
    init();
</script>
</body>
</html>

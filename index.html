
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0a1a}
  #gameWrap{
    font-family:'Press Start 2P',monospace;
    background:#0a0a1a;
    min-height:600px;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:16px 8px;
    image-rendering:pixelated;
  }
  #header{
    width:100%;
    max-width:480px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:12px;
  }
  .logo{font-size:11px;color:#ff6bff;letter-spacing:2px;text-shadow:0 0 8px #ff6bff}
  .score-box{display:flex;gap:24px}
  .score-label{font-size:8px;color:#555;display:block;margin-bottom:4px}
  .score-val{font-size:10px;color:#00ffcc;text-shadow:0 0 6px #00ffcc}
  #canvasWrap{
    position:relative;
    border:3px solid #333;
    box-shadow:0 0 0 1px #111,0 0 30px rgba(0,255,204,0.1);
  }
  canvas{display:block;background:#0a0a1a}
  #overlay{
    position:absolute;inset:0;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    background:rgba(10,10,26,0.92);
    gap:16px;
  }
  .ov-title{font-size:13px;color:#ff6bff;text-shadow:0 0 8px #ff6bff;text-align:center;line-height:2}
  .ov-sub{font-size:8px;color:#888;text-align:center;line-height:2}
  #startBtn{
    margin-top:8px;
    font-family:'Press Start 2P',monospace;
    font-size:9px;
    padding:10px 24px;
    background:transparent;
    border:2px solid #ff6bff;
    color:#ff6bff;
    cursor:pointer;
    letter-spacing:1px;
    transition:all 0.15s;
    text-shadow:0 0 6px #ff6bff;
    box-shadow:0 0 12px rgba(255,107,255,0.3);
  }
  #startBtn:hover{background:#ff6bff20;box-shadow:0 0 20px rgba(255,107,255,0.5)}
  #livesWrap{
    display:flex;gap:8px;margin-top:10px
  }
  .life{width:12px;height:12px;background:#ff6bff;box-shadow:0 0 4px #ff6bff;clip-path:polygon(50% 0%,100% 100%,0% 100%)}
</style>

<div id="gameWrap">
  <div id="header">
    <div class="logo">BREAKOUT</div>
    <div class="score-box">
      <div><span class="score-label">SKOR</span><span class="score-val" id="scoreVal">0</span></div>
      <div><span class="score-label">EN İYİ</span><span class="score-val" id="bestVal">0</span></div>
    </div>
  </div>
  <div id="canvasWrap">
    <canvas id="gc" width="480" height="460"></canvas>
    <div id="overlay">
      <div class="ov-title">BREAKOUT<br>RETRO</div>
      <div class="ov-sub">← → tuşları veya fare<br>ile raket hareket eder</div>
      <button id="startBtn">BAŞLAT</button>
    </div>
  </div>
  <div id="livesWrap"></div>
</div>

<script>
const c=document.getElementById('gc'),ctx=c.getContext('2d');
const W=c.width,H=c.height;
const BRICK_ROWS=6,BRICK_COLS=10,BRICK_W=42,BRICK_H=16,BRICK_PAD=4,BRICK_OFFX=13,BRICK_OFFY=40;
const PADDLE_W=80,PADDLE_H=10,BALL_R=6;
const COLORS=[['#ff3366','#ff6690'],['#ff6bff','#ff9fff'],['#c06bff','#d99fff'],['#00ffcc','#66ffee'],['#00aaff','#66ccff'],['#ffcc00','#ffe066']];

let state,score,best=0,lives,bx,by,bdx,bdy,px,gameRunning=false,raf;
const overlay=document.getElementById('overlay');
const startBtn=document.getElementById('startBtn');
const scoreEl=document.getElementById('scoreVal');
const bestEl=document.getElementById('bestVal');
const livesWrap=document.getElementById('livesWrap');

function initGame(){
  bricks=[];
  for(let r=0;r<BRICK_ROWS;r++){
    bricks[r]=[];
    for(let col=0;col<BRICK_COLS;col++){
      bricks[r][col]={alive:true,hp:r<2?2:1};
    }
  }
  score=0;lives=3;
  px=W/2-PADDLE_W/2;
  bx=W/2;by=H-80;
  let angle=(Math.random()*0.6+0.2)*(Math.random()<0.5?1:-1);
  let spd=4.5;
  bdx=spd*Math.sin(angle);
  bdy=-spd*Math.cos(angle);
  updateScore();updateLives();
}

function updateScore(){scoreEl.textContent=score;if(score>best){best=score;bestEl.textContent=best}}
function updateLives(){
  livesWrap.innerHTML='';
  for(let i=0;i<lives;i++){let d=document.createElement('div');d.className='life';livesWrap.appendChild(d)}
}

function drawBricks(){
  for(let r=0;r<BRICK_ROWS;r++){
    let [c1,c2]=COLORS[r]||COLORS[0];
    for(let col=0;col<BRICK_COLS;col++){
      let b=bricks[r][col];
      if(!b.alive)continue;
      let x=BRICK_OFFX+col*(BRICK_W+BRICK_PAD);
      let y=BRICK_OFFY+r*(BRICK_H+BRICK_PAD);
      ctx.fillStyle=b.hp===2?c2:c1;
      ctx.fillRect(x,y,BRICK_W,BRICK_H);
      ctx.fillStyle=b.hp===2?c1:'rgba(255,255,255,0.2)';
      ctx.fillRect(x,y,BRICK_W,3);
      ctx.fillRect(x,y,3,BRICK_H);
      if(b.hp===2){
        ctx.fillStyle='rgba(0,0,0,0.3)';
        ctx.fillRect(x+BRICK_W/2-6,y+BRICK_H/2-2,12,4);
      }
    }
  }
}

function drawPaddle(){
  let grd=ctx.createLinearGradient(px,0,px+PADDLE_W,0);
  grd.addColorStop(0,'#00ffcc');grd.addColorStop(0.5,'#66ffee');grd.addColorStop(1,'#00ffcc');
  ctx.fillStyle=grd;
  ctx.fillRect(px,H-30,PADDLE_W,PADDLE_H);
  ctx.fillStyle='rgba(255,255,255,0.4)';
  ctx.fillRect(px,H-30,PADDLE_W,3);
}

function drawBall(){
  ctx.beginPath();
  ctx.arc(bx,by,BALL_R,0,Math.PI*2);
  ctx.fillStyle='#fffbe0';
  ctx.fill();
  ctx.beginPath();
  ctx.arc(bx-2,by-2,2,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.8)';
  ctx.fill();
  ctx.beginPath();
  ctx.arc(bx,by,BALL_R+3,0,Math.PI*2);
  ctx.fillStyle='rgba(255,251,224,0.15)';
  ctx.fill();
}

function drawBg(){
  ctx.fillStyle='#0a0a1a';
  ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='#111a2a';
  ctx.lineWidth=1;
  for(let x=0;x<W;x+=30){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke()}
  for(let y=0;y<H;y+=30){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}
}

let particles=[];
function spawnParticles(x,y,col){
  for(let i=0;i<8;i++){
    let angle=Math.random()*Math.PI*2,spd=Math.random()*3+1;
    particles.push({x,y,vx:Math.cos(angle)*spd,vy:Math.sin(angle)*spd,life:30,col});
  }
}
function updateParticles(){
  particles=particles.filter(p=>p.life>0);
  for(let p of particles){
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;p.life--;
    ctx.globalAlpha=p.life/30;
    ctx.fillStyle=p.col;
    ctx.fillRect(p.x-2,p.y-2,4,4);
  }
  ctx.globalAlpha=1;
}

function checkBrickCollision(){
  for(let r=0;r<BRICK_ROWS;r++){
    for(let col=0;col<BRICK_COLS;col++){
      let b=bricks[r][col];
      if(!b.alive)continue;
      let x=BRICK_OFFX+col*(BRICK_W+BRICK_PAD);
      let y=BRICK_OFFY+r*(BRICK_H+BRICK_PAD);
      if(bx+BALL_R>x&&bx-BALL_R<x+BRICK_W&&by+BALL_R>y&&by-BALL_R<y+BRICK_H){
        b.hp--;
        if(b.hp<=0){b.alive=false;score+=r<2?20:10;updateScore();spawnParticles(x+BRICK_W/2,y+BRICK_H/2,COLORS[r][0])}
        let overlapL=bx-x,overlapR=x+BRICK_W-bx,overlapT=by-y,overlapB=y+BRICK_H-by;
        let minH=Math.min(overlapL,overlapR),minV=Math.min(overlapT,overlapB);
        if(minH<minV)bdx=-bdx; else bdy=-bdy;
        return;
      }
    }
  }
}

function allClear(){
  for(let r=0;r<BRICK_ROWS;r++)for(let col=0;col<BRICK_COLS;col++)if(bricks[r][col].alive)return false;
  return true;
}

function showOverlay(title,sub,btn){
  overlay.innerHTML=`<div class="ov-title">${title}</div><div class="ov-sub">${sub}</div><button id="startBtn" style="margin-top:8px;font-family:'Press Start 2P',monospace;font-size:9px;padding:10px 24px;background:transparent;border:2px solid #ff6bff;color:#ff6bff;cursor:pointer;letter-spacing:1px;text-shadow:0 0 6px #ff6bff;box-shadow:0 0 12px rgba(255,107,255,0.3)">${btn}</button>`;
  overlay.style.display='flex';
  document.getElementById('startBtn').onclick=startGame;
}

function startGame(){
  overlay.style.display='none';
  initGame();gameRunning=true;
  if(raf)cancelAnimationFrame(raf);
  loop();
}

function loop(){
  if(!gameRunning)return;
  drawBg();
  bx+=bdx;by+=bdy;
  if(bx-BALL_R<0){bx=BALL_R;bdx=Math.abs(bdx)}
  if(bx+BALL_R>W){bx=W-BALL_R;bdx=-Math.abs(bdx)}
  if(by-BALL_R<0){by=BALL_R;bdy=Math.abs(bdy)}
  if(by+BALL_R>H){
    lives--;updateLives();
    if(lives<=0){gameRunning=false;showOverlay('GAME OVER','Skor: '+score,'YENİDEN OYNA');return}
    bx=W/2;by=H-80;bdx=(Math.random()<0.5?1:-1)*4.5;bdy=-4.5;
  }
  if(by+BALL_R>=H-30&&by-BALL_R<=H-20&&bx>px-4&&bx<px+PADDLE_W+4){
    bdy=-Math.abs(bdy);
    let rel=(bx-(px+PADDLE_W/2))/(PADDLE_W/2);
    bdx=rel*5;
    let spd=Math.sqrt(bdx*bdx+bdy*bdy);
    bdx=bdx/spd*5;bdy=bdy/spd*5;
  }
  checkBrickCollision();
  drawBricks();drawPaddle();drawBall();updateParticles();
  if(allClear()){gameRunning=false;showOverlay('TEBRİKLER!','Tüm blokları kırdın!<br>Skor: '+score,'YENİDEN OYNA');return}
  raf=requestAnimationFrame(loop);
}

document.addEventListener('mousemove',e=>{
  if(!gameRunning)return;
  let rect=c.getBoundingClientRect();
  let mx=e.clientX-rect.left;
  px=mx-PADDLE_W/2;
  px=Math.max(0,Math.min(W-PADDLE_W,px));
});
let keys={};
document.addEventListener('keydown',e=>{keys[e.key]=true});
document.addEventListener('keyup',e=>{keys[e.key]=false});
function moveKeys(){
  if(!gameRunning)return;
  if(keys['ArrowLeft']||keys['a'])px=Math.max(0,px-7);
  if(keys['ArrowRight']||keys['d'])px=Math.min(W-PADDLE_W,px+7);
}
setInterval(moveKeys,16);

c.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(!gameRunning)return;
  let rect=c.getBoundingClientRect();
  let tx=e.touches[0].clientX-rect.left;
  px=tx-PADDLE_W/2;
  px=Math.max(0,Math.min(W-PADDLE_W,px));
},{passive:false});

startBtn.onclick=startGame;
drawBg();
</script>

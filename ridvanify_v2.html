<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Ridvanify</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root {
  --bg-base: #0a0a0f;
  --bg-elevated: #111118;
  --bg-card: #16161f;
  --bg-card-hover: #1c1c28;
  --bg-glass: rgba(22,22,31,0.7);
  --bg-sidebar: #0f0f16;
  --accent: #1db954;
  --accent-dim: rgba(29,185,84,0.12);
  --accent-glow: rgba(29,185,84,0.35);
  --accent2: #1ed760;
  --text-primary: #ffffff;
  --text-secondary: #a7a7a7;
  --text-muted: #535353;
  --border: rgba(255,255,255,0.06);
  --border-hover: rgba(255,255,255,0.12);
  --player-bg: rgba(9,9,15,0.97);
  --sidebar-w: 240px;
  --radius-lg: 16px;
  --radius-md: 10px;
  --radius-sm: 6px;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

html { font-size:14px; }

body {
  font-family:'Sora', sans-serif;
  background: var(--bg-base);
  color: var(--text-primary);
  height: 100vh;
  display: grid;
  grid-template-rows: 1fr 90px;
  grid-template-columns: var(--sidebar-w) 1fr;
  overflow: hidden;
}

/* ─── SCROLLBAR ─── */
::-webkit-scrollbar { width:5px; height:5px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--text-muted); border-radius:99px; }
::-webkit-scrollbar-thumb:hover { background:var(--text-secondary); }

/* ─── SIDEBAR ─── */
.sidebar {
  grid-row: 1;
  grid-column: 1;
  background: var(--bg-sidebar);
  display:flex;
  flex-direction:column;
  padding: 0;
  border-right: 1px solid var(--border);
  overflow:hidden;
}

.sidebar-logo {
  padding: 28px 24px 20px;
  display:flex;
  align-items:center;
  gap:10px;
}
.logo-mark {
  width:36px; height:36px;
  background: var(--accent);
  border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:16px; color:#000;
  flex-shrink:0;
}
.logo-text {
  font-size:1.3rem;
  font-weight:800;
  letter-spacing:-0.5px;
  color: var(--text-primary);
}

.sidebar-nav {
  padding: 0 12px;
  display:flex;
  flex-direction:column;
  gap:2px;
}
.nav-item {
  display:flex;
  align-items:center;
  gap:14px;
  padding:10px 14px;
  border-radius:var(--radius-sm);
  cursor:pointer;
  font-size:0.9rem;
  font-weight:600;
  color: var(--text-secondary);
  transition: all 0.15s;
  text-decoration:none;
}
.nav-item:hover { background: rgba(255,255,255,0.05); color: var(--text-primary); }
.nav-item.active { background: rgba(255,255,255,0.1); color: var(--text-primary); }
.nav-item i { font-size:1.1rem; width:20px; }

.sidebar-divider {
  height:1px;
  background: var(--border);
  margin: 14px 16px;
}

.library-header {
  padding: 0 26px 10px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.library-header span {
  font-size:0.8rem;
  font-weight:700;
  letter-spacing:0.08em;
  text-transform:uppercase;
  color: var(--text-muted);
}

.library-list {
  flex:1;
  overflow-y:auto;
  padding: 0 12px 12px;
  display:flex;
  flex-direction:column;
  gap:2px;
}
.lib-item {
  display:flex; align-items:center; gap:12px;
  padding:8px 14px;
  border-radius:var(--radius-sm);
  cursor:pointer;
  transition: background 0.15s;
}
.lib-item:hover { background: rgba(255,255,255,0.05); }
.lib-icon {
  width:36px; height:36px;
  border-radius:var(--radius-sm);
  display:flex; align-items:center; justify-content:center;
  font-size:0.9rem;
  flex-shrink:0;
}
.lib-icon.special { background: linear-gradient(135deg,#1db954,#0a7a33); color:#fff; }
.lib-icon.regular { background: var(--bg-card); color: var(--text-secondary); }
.lib-info { min-width:0; }
.lib-title { font-size:0.85rem; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.lib-sub { font-size:0.72rem; color: var(--text-muted); margin-top:1px; }

/* ─── MAIN CONTENT ─── */
.main {
  grid-row: 1;
  grid-column: 2;
  overflow-y: auto;
  background: var(--bg-base);
  position:relative;
}

.main-gradient {
  position:sticky;
  top:0;
  height:60px;
  background: linear-gradient(to bottom, var(--bg-base), transparent);
  z-index:10;
  pointer-events:none;
  margin-bottom:-60px;
}

.main-topbar {
  position:sticky;
  top:0;
  z-index:20;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding: 16px 32px;
  background: rgba(10,10,15,0.85);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  gap:16px;
}

.topbar-nav { display:flex; gap:8px; }
.topbar-btn {
  width:32px; height:32px;
  border-radius:50%;
  background: rgba(255,255,255,0.08);
  border:none;
  color: var(--text-primary);
  cursor:pointer;
  font-size:0.85rem;
  display:flex; align-items:center; justify-content:center;
  transition:0.15s;
}
.topbar-btn:hover { background: rgba(255,255,255,0.15); }

.search-wrap {
  flex:1;
  max-width:360px;
  position:relative;
}
.search-wrap i {
  position:absolute;
  left:14px; top:50%;
  transform:translateY(-50%);
  color: var(--text-muted);
  font-size:0.9rem;
}
.search-input {
  width:100%;
  background: rgba(255,255,255,0.08);
  border: 1px solid var(--border);
  border-radius:var(--radius-sm);
  padding: 9px 14px 9px 38px;
  color: var(--text-primary);
  font-family:'Sora', sans-serif;
  font-size:0.88rem;
  outline:none;
  transition:0.2s;
}
.search-input:focus { border-color: var(--text-secondary); background: rgba(255,255,255,0.1); }
.search-input::placeholder { color: var(--text-muted); }

.user-pill {
  display:flex; align-items:center; gap:8px;
  background: rgba(255,255,255,0.08);
  border-radius:999px;
  padding:4px 12px 4px 4px;
  cursor:pointer;
  transition:0.15s;
  border: 1px solid var(--border);
}
.user-pill:hover { background: rgba(255,255,255,0.12); }
.user-avatar {
  width:28px; height:28px;
  border-radius:50%;
  background: linear-gradient(135deg,#1db954,#148a3d);
  display:flex; align-items:center; justify-content:center;
  font-size:0.75rem; color:#000; font-weight:700;
}
.user-name { font-size:0.82rem; font-weight:600; }

/* ─── HERO ─── */
.hero {
  padding: 32px 32px 0;
}
.greeting { font-size:0.85rem; color: var(--text-muted); margin-bottom:4px; }
.hero-title {
  font-size:2.4rem;
  font-weight:800;
  letter-spacing:-1px;
  line-height:1.1;
  margin-bottom:20px;
}
.hero-title span {
  background: linear-gradient(90deg,#1db954,#5be88a);
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
}

/* ─── CATEGORY PILLS ─── */
.cat-row {
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-bottom:32px;
  padding: 0 32px;
}
.cat-pill {
  padding: 7px 18px;
  border-radius:999px;
  border: 1px solid var(--border);
  background: var(--bg-card);
  color: var(--text-secondary);
  font-family:'Sora',sans-serif;
  font-size:0.82rem;
  font-weight:600;
  cursor:pointer;
  transition:all 0.2s;
  letter-spacing:0.02em;
}
.cat-pill:hover { border-color: var(--border-hover); color: var(--text-primary); background: var(--bg-card-hover); }
.cat-pill.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #000;
}

/* ─── SECTION ─── */
.section { padding: 0 32px 36px; }
.section-hd {
  display:flex;
  align-items:baseline;
  justify-content:space-between;
  margin-bottom:18px;
}
.section-hd h2 { font-size:1.35rem; font-weight:700; letter-spacing:-0.3px; }
.see-all { font-size:0.78rem; font-weight:700; color: var(--text-muted); cursor:pointer; text-transform:uppercase; letter-spacing:0.08em; transition:0.15s; }
.see-all:hover { color: var(--text-primary); }

/* ─── CARD GRID ─── */
.card-grid {
  display:grid;
  grid-template-columns: repeat(auto-fill, minmax(175px, 1fr));
  gap:18px;
}

.music-card {
  background: var(--bg-card);
  border-radius:var(--radius-lg);
  padding:14px;
  cursor:pointer;
  transition: all 0.2s cubic-bezier(.25,.8,.25,1);
  border:1px solid transparent;
  position:relative;
  group: true;
}
.music-card:hover {
  background: var(--bg-card-hover);
  border-color: var(--border-hover);
  transform: translateY(-2px);
  box-shadow: 0 12px 32px rgba(0,0,0,0.6);
}

.card-thumb {
  width:100%;
  aspect-ratio:1;
  border-radius:var(--radius-md);
  margin-bottom:12px;
  overflow:hidden;
  position:relative;
  background: #1a1a24;
}
.card-thumb img {
  width:100%; height:100%;
  object-fit:cover;
  display:block;
  transition:transform 0.3s;
}
.music-card:hover .card-thumb img { transform:scale(1.03); }

.thumb-placeholder {
  width:100%; height:100%;
  display:flex; align-items:center; justify-content:center;
  font-size:2.2rem;
  background: linear-gradient(135deg, rgba(29,185,84,0.15), rgba(29,185,84,0.04));
  color: var(--accent);
}

.play-overlay {
  position:absolute;
  bottom:10px; right:10px;
  width:40px; height:40px;
  background: var(--accent);
  border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:0.95rem; color:#000;
  opacity:0;
  transform:translateY(6px);
  transition:all 0.2s cubic-bezier(.25,.8,.25,1);
  box-shadow: 0 6px 20px rgba(29,185,84,0.45);
  z-index:2;
}
.music-card:hover .play-overlay {
  opacity:1;
  transform:translateY(0);
}
.play-overlay.playing-indicator {
  opacity:1;
  transform:translateY(0);
  background: var(--accent2);
}

.badge-row {
  position:absolute;
  top:8px; left:8px;
  display:flex; gap:4px;
  z-index:2;
}
.badge {
  font-size:0.65rem;
  font-weight:700;
  padding: 3px 8px;
  border-radius:999px;
  letter-spacing:0.04em;
  text-transform:uppercase;
}
.badge-exclusive { background:rgba(29,185,84,0.9); color:#000; }
.badge-diss { background:rgba(220,38,38,0.9); color:#fff; }

.card-title { font-size:0.88rem; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.card-artist { font-size:0.76rem; color: var(--text-muted); margin-top:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

/* currently playing highlight */
.music-card.is-playing { border-color: rgba(29,185,84,0.4); background: rgba(29,185,84,0.05); }
.music-card.is-playing .card-title { color: var(--accent); }

/* ─── PLAYER BAR ─── */
.player {
  grid-row: 2;
  grid-column: 1 / -1;
  background: var(--player-bg);
  border-top: 1px solid var(--border);
  display:grid;
  grid-template-columns: 1fr 2fr 1fr;
  align-items:center;
  padding: 0 24px;
  gap:16px;
  backdrop-filter: blur(30px);
  position:relative;
  z-index:100;
}

/* left: track info */
.player-track {
  display:flex;
  align-items:center;
  gap:12px;
  min-width:0;
}
.player-art {
  width:54px; height:54px;
  border-radius:var(--radius-sm);
  overflow:hidden;
  background: var(--bg-card);
  flex-shrink:0;
  position:relative;
}
.player-art img { width:100%; height:100%; object-fit:cover; }
.player-art-icon {
  width:100%; height:100%;
  display:flex; align-items:center; justify-content:center;
  font-size:1.3rem; color: var(--accent);
}
.player-meta { min-width:0; }
.player-song { font-size:0.88rem; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.player-artist { font-size:0.76rem; color: var(--text-muted); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

.heart-btn {
  background:none; border:none;
  color: var(--text-muted);
  font-size:1rem; cursor:pointer;
  transition:0.15s;
  flex-shrink:0;
  padding:4px;
}
.heart-btn:hover { color: var(--text-primary); }
.heart-btn.liked { color: var(--accent); }

/* center: controls */
.player-controls {
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:8px;
}
.ctrl-row {
  display:flex;
  align-items:center;
  gap:24px;
}
.ctrl-btn {
  background:none; border:none;
  color: var(--text-secondary);
  font-size:1rem; cursor:pointer;
  transition:0.15s;
  padding:4px;
  display:flex; align-items:center; justify-content:center;
}
.ctrl-btn:hover { color: var(--text-primary); transform:scale(1.05); }
.ctrl-btn.active { color: var(--accent); }

.play-btn {
  width:38px; height:38px;
  border-radius:50%;
  background: var(--text-primary);
  color: #000;
  font-size:0.95rem;
  border:none; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:all 0.15s;
  flex-shrink:0;
}
.play-btn:hover { background:#fff; transform:scale(1.04); }

.progress-row {
  display:flex;
  align-items:center;
  gap:10px;
  width:100%;
}
.time { font-size:0.7rem; color: var(--text-muted); font-family:'DM Mono',monospace; min-width:30px; }
.time-right { text-align:right; }

.progress-track {
  flex:1;
  height:4px;
  background: rgba(255,255,255,0.15);
  border-radius:99px;
  cursor:pointer;
  position:relative;
  transition:height 0.1s;
}
.progress-track:hover { height:6px; }
.progress-fill {
  height:100%;
  background: var(--text-primary);
  border-radius:99px;
  width:0%;
  pointer-events:none;
  position:relative;
  transition: background 0.2s;
}
.progress-track:hover .progress-fill { background: var(--accent); }

/* right: volume + lyrics btn */
.player-right {
  display:flex;
  align-items:center;
  justify-content:flex-end;
  gap:14px;
}

.lyrics-toggle-btn {
  background:none; border:none;
  color: var(--text-muted);
  font-size:1rem; cursor:pointer;
  padding:6px; border-radius:var(--radius-sm);
  transition:all 0.2s;
  position:relative;
}
.lyrics-toggle-btn:hover { color: var(--text-primary); }
.lyrics-toggle-btn.open { color: var(--accent); }
.lyrics-toggle-btn::after {
  content:'';
  position:absolute;
  bottom:-4px; left:50%;
  transform:translateX(-50%) scaleX(0);
  width:16px; height:2px;
  background: var(--accent);
  border-radius:99px;
  transition:transform 0.2s;
}
.lyrics-toggle-btn.open::after { transform:translateX(-50%) scaleX(1); }

.vol-wrap {
  display:flex; align-items:center; gap:8px;
}
.vol-icon { background:none; border:none; color: var(--text-secondary); cursor:pointer; font-size:0.95rem; transition:0.15s; }
.vol-icon:hover { color: var(--text-primary); }
.vol-slider {
  width:80px; height:4px;
  -webkit-appearance:none;
  background: rgba(255,255,255,0.15);
  border-radius:99px;
  outline:none;
  cursor:pointer;
}
.vol-slider::-webkit-slider-thumb {
  -webkit-appearance:none;
  width:12px; height:12px;
  border-radius:50%;
  background: var(--text-primary);
  cursor:pointer;
  transition:transform 0.15s;
}
.vol-slider::-webkit-slider-thumb:hover { transform:scale(1.25); }

/* ─── LYRICS PANEL ─── */
.lyrics-panel {
  position:fixed;
  top:0; right:0;
  width:380px;
  height:calc(100vh - 90px);
  background: rgba(10,10,18,0.92);
  backdrop-filter: blur(40px);
  border-left: 1px solid var(--border);
  z-index:500;
  display:flex;
  flex-direction:column;
  transform: translateX(100%);
  transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
  overflow:hidden;
}
.lyrics-panel.open { transform:translateX(0); }

.lyrics-panel-header {
  padding: 24px 24px 16px;
  border-bottom: 1px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:space-between;
  flex-shrink:0;
}
.lyrics-panel-title {
  display:flex;
  flex-direction:column;
  gap:3px;
}
.lyrics-panel-label {
  font-size:0.68rem;
  font-weight:700;
  letter-spacing:0.1em;
  text-transform:uppercase;
  color: var(--text-muted);
}
.lyrics-panel-song {
  font-size:1.05rem;
  font-weight:700;
  letter-spacing:-0.3px;
}
.lyrics-panel-artist { font-size:0.8rem; color: var(--text-muted); }
.lyrics-close {
  background:none; border:none;
  color: var(--text-muted);
  font-size:1.2rem; cursor:pointer;
  padding:6px; border-radius:var(--radius-sm);
  transition:0.15s;
}
.lyrics-close:hover { color: var(--text-primary); background: rgba(255,255,255,0.06); }

.lyrics-art-strip {
  padding: 20px 24px;
  display:flex;
  align-items:center;
  gap:16px;
  border-bottom: 1px solid var(--border);
  flex-shrink:0;
}
.lyrics-art {
  width:60px; height:60px;
  border-radius:10px;
  overflow:hidden;
  background: var(--bg-card);
  flex-shrink:0;
}
.lyrics-art img { width:100%; height:100%; object-fit:cover; }
.lyrics-art-icon {
  width:100%; height:100%;
  display:flex; align-items:center; justify-content:center;
  font-size:1.4rem; color: var(--accent);
}
.lyrics-art-info .song-name { font-size:0.95rem; font-weight:700; }
.lyrics-art-info .artist-name { font-size:0.8rem; color: var(--text-muted); margin-top:3px; }

.lyrics-content {
  flex:1;
  overflow-y:auto;
  padding: 28px 28px 40px;
}

.lyrics-empty {
  height:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:14px;
  color: var(--text-muted);
}
.lyrics-empty i { font-size:2.5rem; opacity:0.3; }
.lyrics-empty p { font-size:0.88rem; text-align:center; line-height:1.6; }

.lyrics-verses { display:flex; flex-direction:column; gap:24px; }

.verse-block {
  opacity:0;
  transform:translateY(16px);
  animation: verseIn 0.5s cubic-bezier(0.4,0,0.2,1) forwards;
}
@keyframes verseIn {
  to { opacity:1; transform:translateY(0); }
}

.verse-label {
  font-size:0.7rem;
  font-weight:700;
  letter-spacing:0.12em;
  text-transform:uppercase;
  color: var(--accent);
  margin-bottom:10px;
  font-family:'DM Mono',monospace;
}

.verse-lines {
  display:flex;
  flex-direction:column;
  gap:4px;
}
.lyric-line {
  font-size:0.92rem;
  line-height:1.75;
  color: rgba(255,255,255,0.75);
  font-weight:400;
  letter-spacing:0.01em;
}
.lyric-line:empty { height:12px; }

/* ─── EMPTY STATE ─── */
.no-results {
  grid-column:1/-1;
  padding:60px 20px;
  text-align:center;
  color: var(--text-muted);
}
.no-results i { font-size:2rem; display:block; margin-bottom:12px; opacity:0.4; }

/* ─── ANIMATIONS ─── */
@keyframes fadeUp {
  from { opacity:0; transform:translateY(10px); }
  to { opacity:1; transform:translateY(0); }
}
.music-card {
  animation: fadeUp 0.3s ease both;
}

/* ─── CURRENTLY PLAYING INDICATOR ─── */
@keyframes soundBars {
  0%,100% { transform:scaleY(0.4); }
  50% { transform:scaleY(1); }
}
.playing-bars {
  display:flex;
  align-items:flex-end;
  gap:2px;
  height:14px;
}
.playing-bar {
  width:3px;
  background: var(--accent);
  border-radius:2px;
  transform-origin:bottom;
}
.playing-bar:nth-child(1) { animation: soundBars 0.8s ease-in-out infinite; height:8px; }
.playing-bar:nth-child(2) { animation: soundBars 0.8s ease-in-out 0.15s infinite; height:14px; }
.playing-bar:nth-child(3) { animation: soundBars 0.8s ease-in-out 0.3s infinite; height:10px; }
.playing-bars.paused .playing-bar { animation-play-state:paused; }

/* Noise texture overlay */
body::after {
  content:'';
  position:fixed;
  inset:0;
  opacity:0.018;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  pointer-events:none;
  z-index:9999;
}

/* ─── RESPONSIVE ─── */
@media (max-width:900px) {
  body { grid-template-columns:1fr; }
  .sidebar { display:none; }
  .player { grid-template-columns:1fr 1fr; }
  .player-right { display:none; }
  .lyrics-panel { width:100%; border-left:none; }
}

const CATEGORIES = ["Tümü","ridvani","pop","soul","rnb","funk","hiphop"];
const CAT_LABELS = { "Tümü":"🔥 Tümü","ridvani":"👑 Ridvani","pop":"Pop","soul":"Soul","rnb":"R&B","funk":"Funk","hiphop":"Hip Hop" };

// ═══════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════
let playlist = [...SONGS];
let idx = 0;
let playing = false;
let liked = new Set();
let shuffle = false;
let repeat = false;
let lyricsOpen = false;
let activeCategory = "Tümü";
let audio = new Audio();
audio.volume = 0.75;

// ═══════════════════════════════════════════════
//  GREETING
// ═══════════════════════════════════════════════
(function setGreeting(){
  const h = new Date().getHours();
  const g = document.getElementById('greetingText');
  if(h<12) g.textContent = "Günaydın 🌅";
  else if(h<18) g.textContent = "İyi öğlenler ☀️";
  else g.textContent = "İyi akşamlar 🌙";
})();

// ═══════════════════════════════════════════════
//  LIBRARY SIDEBAR
// ═══════════════════════════════════════════════
function renderLibrary(){
  const el = document.getElementById('libraryList');
  el.innerHTML = SONGS.slice(0,7).map(s=>`
    <div class="lib-item" data-sid="${s.id}">
      <div class="lib-icon ${s.exclusive?'special':'regular'}">
        <i class="fas ${s.icon}"></i>
      </div>
      <div class="lib-info">
        <div class="lib-title">${esc(s.title)}</div>
        <div class="lib-sub">${esc(s.artist)}</div>
      </div>
    </div>
  `).join('');
  el.querySelectorAll('.lib-item').forEach(li=>{
    li.addEventListener('click',()=>{
      const sid = parseInt(li.dataset.sid);
      playSongById(sid);
    });
  });
}

// ═══════════════════════════════════════════════
//  CATEGORIES
// ═══════════════════════════════════════════════
function renderCategories(){
  const row = document.getElementById('catRow');
  row.innerHTML = CATEGORIES.map(c=>`
    <button class="cat-pill ${activeCategory===c?'active':''}" data-cat="${c}">${CAT_LABELS[c]||c}</button>
  `).join('');
  row.querySelectorAll('.cat-pill').forEach(btn=>{
    btn.addEventListener('click',()=>{
      activeCategory = btn.dataset.cat;
      renderCategories();
      renderGrids();
    });
  });
}

// ═══════════════════════════════════════════════
//  GRIDS
// ═══════════════════════════════════════════════
function filtered(){
  let list = [...SONGS];
  if(activeCategory!=="Tümü") list=list.filter(s=>s.category===activeCategory);
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  if(q) list=list.filter(s=>s.title.toLowerCase().includes(q)||s.artist.toLowerCase().includes(q));
  return list;
}

function cardHTML(s, animDelay=0){
  const isPlaying = playlist[idx]?.id===s.id && playing;
  const isPaused  = playlist[idx]?.id===s.id && !playing;
  const isCurrent = playlist[idx]?.id===s.id;
  return `
    <div class="music-card ${isCurrent?'is-playing':''}" data-sid="${s.id}" style="animation-delay:${animDelay}ms">
      <div class="card-thumb">
        ${s.img
          ? `<img src="${s.img}" alt="${esc(s.title)}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
          : ''
        }
        <div class="thumb-placeholder" ${s.img?'style="display:none"':''}>
          <i class="fas ${s.icon}"></i>
        </div>
        <div class="badge-row">
          ${s.exclusive?'<span class="badge badge-exclusive">Exclusive</span>':''}
          ${s.diss?'<span class="badge badge-diss">Diss</span>':''}
        </div>
        <div class="play-overlay ${isCurrent?'playing-indicator':''}">
          ${isCurrent
            ? `<div class="playing-bars ${playing?'':'paused'}">
                <div class="playing-bar"></div>
                <div class="playing-bar"></div>
                <div class="playing-bar"></div>
              </div>`
            : `<i class="fas fa-play" style="margin-left:2px"></i>`
          }
        </div>
      </div>
      <div class="card-title">${esc(s.title)}</div>
      <div class="card-artist">${esc(s.artist)}</div>
    </div>
  `;
}

function renderGrids(){
  const list = filtered();
  const g1 = document.getElementById('grid1');
  const g2 = document.getElementById('grid2');
  const sec2 = document.getElementById('section2Wrap');

  const ridvani = list.filter(s=>s.category==='ridvani');
  const others  = list.filter(s=>s.category!=='ridvani');

  // section 1 title
  const s1title = document.getElementById('section1Title');
  if(activeCategory==='ridvani' || activeCategory==='Tümü'){
    s1title.textContent = '🔥 Ridvani Exclusive';
    g1.innerHTML = (ridvani.length ? ridvani : list).map((s,i)=>cardHTML(s,i*40)).join('');
    if(others.length && activeCategory==='Tümü'){
      sec2.style.display='';
      g2.innerHTML = others.map((s,i)=>cardHTML(s,i*40)).join('');
    } else {
      sec2.style.display = 'none';
    }
  } else {
    s1title.textContent = '🎧 Keşfet';
    g1.innerHTML = list.length ? list.map((s,i)=>cardHTML(s,i*40)).join('') : `<div class="no-results"><i class="fas fa-search"></i>Sonuç bulunamadı</div>`;
    sec2.style.display='none';
  }

  // bind clicks
  document.querySelectorAll('.music-card[data-sid]').forEach(card=>{
    card.addEventListener('click',()=>{
      const sid = parseInt(card.dataset.sid);
      playSongById(sid);
    });
  });
}

// ═══════════════════════════════════════════════
//  PLAYER LOGIC
// ═══════════════════════════════════════════════
function playSongById(sid){
  const list = filtered().length ? filtered() : SONGS;
  const newIdx = list.findIndex(s=>s.id===sid);
  if(newIdx===-1) return;
  playlist = [...list];
  idx = newIdx;
  loadSong(true);
}

function loadSong(autoPlay=false){
  const song = playlist[idx];
  if(!song) return;
  audio.src = song.src;
  audio.load();
  updatePlayerUI(song);
  if(autoPlay){
    audio.play().then(()=>{ playing=true; updatePlayBtnIcon(); renderGrids(); }).catch(()=>{});
  } else {
    renderGrids();
  }
  if(lyricsOpen) renderLyricsContent(song);
}

function updatePlayerUI(song){
  document.getElementById('playerSong').textContent = song.title;
  document.getElementById('playerArtist').textContent = song.artist;
  const art = document.getElementById('playerArt');
  if(song.img){
    art.innerHTML = `<img src="${song.img}" alt="" onerror="this.parentElement.innerHTML='<div class=player-art-icon><i class=fas\\ ${song.icon}></i></div>'">`;
  } else {
    art.innerHTML = `<div class="player-art-icon"><i class="fas ${song.icon}"></i></div>`;
  }
  document.getElementById('heartBtn').className = `heart-btn${liked.has(song.id)?' liked':''}`;
  document.getElementById('timeCurrent').textContent='0:00';
  document.getElementById('timeTotal').textContent = song.duration ? fmt(song.duration) : '0:00';
  document.getElementById('progressFill').style.width='0%';
  // lyrics panel meta
  document.getElementById('lyricsPanelSong').textContent = song.title;
  document.getElementById('lyricsPanelArtist').textContent = song.artist;
  document.getElementById('lyricsSongName').textContent = song.title;
  document.getElementById('lyricsArtistName').textContent = song.artist;
  const la = document.getElementById('lyricsArt');
  if(song.img){
    la.innerHTML=`<img src="${song.img}" alt="" onerror="this.parentElement.innerHTML='<div class=lyrics-art-icon><i class=fas\\ ${song.icon}></i></div>'">`;
  } else {
    la.innerHTML=`<div class="lyrics-art-icon"><i class="fas ${song.icon}"></i></div>`;
  }
}

function updatePlayBtnIcon(){
  const btn = document.getElementById('playBtn');
  btn.innerHTML = playing ? '<i class="fas fa-pause"></i>' : '<i class="fas fa-play"></i>';
}

function togglePlay(){
  if(!playlist.length) return;
  if(!audio.src || audio.src===''){
    loadSong(true); return;
  }
  if(playing){ audio.pause(); playing=false; }
  else { audio.play(); playing=true; }
  updatePlayBtnIcon();
  renderGrids();
}

function next(){
  if(!playlist.length) return;
  if(shuffle){ idx=Math.floor(Math.random()*playlist.length); }
  else { idx=(idx+1)%playlist.length; }
  loadSong(playing);
}
function prev(){
  if(!playlist.length) return;
  if(audio.currentTime>3){ audio.currentTime=0; return; }
  idx=(idx-1+playlist.length)%playlist.length;
  loadSong(playing);
}

// progress
audio.addEventListener('timeupdate',()=>{
  if(!audio.duration||isNaN(audio.duration)) return;
  const pct = (audio.currentTime/audio.duration)*100;
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('timeCurrent').textContent=fmt(audio.currentTime);
  document.getElementById('timeTotal').textContent=fmt(audio.duration);
});
audio.addEventListener('ended',()=>{
  if(repeat){ audio.currentTime=0; audio.play(); }
  else next();
});
audio.addEventListener('play',()=>{ playing=true; updatePlayBtnIcon(); renderGrids(); });
audio.addEventListener('pause',()=>{ playing=false; updatePlayBtnIcon(); renderGrids(); });

document.getElementById('progressTrack').addEventListener('click',e=>{
  const r = e.currentTarget.getBoundingClientRect();
  const pct = (e.clientX-r.left)/r.width;
  if(audio.duration) audio.currentTime=pct*audio.duration;
});

// controls
document.getElementById('playBtn').addEventListener('click', togglePlay);
document.getElementById('prevBtn').addEventListener('click', prev);
document.getElementById('nextBtn').addEventListener('click', next);

document.getElementById('shuffleBtn').addEventListener('click',()=>{
  shuffle=!shuffle;
  document.getElementById('shuffleBtn').classList.toggle('active',shuffle);
});
document.getElementById('repeatBtn').addEventListener('click',()=>{
  repeat=!repeat;
  document.getElementById('repeatBtn').classList.toggle('active',repeat);
});

document.getElementById('heartBtn').addEventListener('click',()=>{
  const song = playlist[idx];
  if(!song) return;
  if(liked.has(song.id)) liked.delete(song.id); else liked.add(song.id);
  document.getElementById('heartBtn').classList.toggle('liked', liked.has(song.id));
});

// volume
const volSlider = document.getElementById('volSlider');
const volIcon   = document.getElementById('volIcon');
let lastVol = 75;
volSlider.addEventListener('input',e=>{
  audio.volume = e.target.value/100;
  lastVol = +e.target.value;
  updateVolIcon(+e.target.value);
});
volIcon.addEventListener('click',()=>{
  if(audio.volume>0){ audio.volume=0; volSlider.value=0; updateVolIcon(0); }
  else { audio.volume=lastVol/100; volSlider.value=lastVol; updateVolIcon(lastVol); }
});
function updateVolIcon(v){
  const i = volIcon.querySelector('i');
  if(v===0) i.className='fas fa-volume-xmark';
  else if(v<40) i.className='fas fa-volume-low';
  else i.className='fas fa-volume-high';
}

// search
document.getElementById('searchInput').addEventListener('input',renderGrids);

// ═══════════════════════════════════════════════
//  LYRICS PANEL
// ═══════════════════════════════════════════════
const lyricsPanel = document.getElementById('lyricsPanel');
const lyricsToggleBtn = document.getElementById('lyricsToggleBtn');
const lyricsClose = document.getElementById('lyricsClose');

function toggleLyrics(){
  lyricsOpen = !lyricsOpen;
  lyricsPanel.classList.toggle('open', lyricsOpen);
  lyricsToggleBtn.classList.toggle('open', lyricsOpen);
  if(lyricsOpen) renderLyricsContent(playlist[idx]);
}

lyricsToggleBtn.addEventListener('click', toggleLyrics);
lyricsClose.addEventListener('click', toggleLyrics);

function renderLyricsContent(song){
  const content = document.getElementById('lyricsContent');
  if(!song){
    content.innerHTML = `<div class="lyrics-empty"><i class="fas fa-microphone-slash"></i><p>Bir şarkı seçerek<br>sözleri görüntüle.</p></div>`;
    return;
  }
  if(!song.lyrics || song.lyrics.length===0){
    content.innerHTML = `<div class="lyrics-empty"><i class="fas fa-music"></i><p>Bu şarkı için henüz<br>söz eklenmemiş.</p></div>`;
    return;
  }
  content.innerHTML = `<div class="lyrics-verses">${
    song.lyrics.map((verse, vi)=>`
      <div class="verse-block" style="animation-delay:${vi*80}ms">
        <div class="verse-label">${esc(verse.label)}</div>
        <div class="verse-lines">${
          verse.lines.map(line=>
            line.trim()
              ? `<div class="lyric-line">${esc(line)}</div>`
              : `<div class="lyric-line" style="height:6px;"></div>`
          ).join('')
        }</div>
      </div>
    `).join('')
  }</div>`;
}

// ═══════════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════════
function fmt(s){
  if(isNaN(s)) return '0:00';
  const m=Math.floor(s/60), sec=Math.floor(s%60);
  return `${m}:${sec<10?'0':''}${sec}`;
}
function esc(str){
  return String(str||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
}

// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════
function init(){
  renderLibrary();
  renderCategories();
  renderGrids();
  playlist = [...SONGS];
  idx = 0;
  updatePlayerUI(playlist[0]);
}

init();
</script>
